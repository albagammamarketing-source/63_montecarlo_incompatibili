name: Aggiorna output Monte Carlo pubblici

on:
  workflow_dispatch:
  schedule:
    - cron: "20 */3 * * *"

permissions:
  contents: write

jobs:
  genera-output:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository privata codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Controlla matrice esiti
        run: |
          test -f Matrice_Compatibilita_Esiti_Calcio_v1_0.xlsx || {
            echo "Manca Matrice_Compatibilita_Esiti_Calcio_v1_0.xlsx nella root."
            exit 1
          }

      - name: Prepara cartella runtime
        run: |
          rm -rf .runtime_output
          mkdir -p .runtime_output

      - name: Esegui pipeline con CF interno, cliente_id pubblico e mappa privata
        env:
          PIPELINE_DB_CONFIG_JSON: ${{ secrets.PIPELINE_DB_CONFIG_JSON }}
          PIPELINE_DB_HOST: ${{ secrets.PIPELINE_DB_HOST }}
          PIPELINE_DB_USER: ${{ secrets.PIPELINE_DB_USER }}
          PIPELINE_DB_PASSWORD: ${{ secrets.PIPELINE_DB_PASSWORD }}
          PIPELINE_DB_PORT: ${{ secrets.PIPELINE_DB_PORT }}

          CLIENTE_ID_SALT: ${{ secrets.CLIENTE_ID_SALT }}

          PIPELINE_PROJECT_PATH: ${{ github.workspace }}
          PIPELINE_BASE_PATH: ${{ github.workspace }}/.runtime_output
          PIPELINE_MATRIX_FILE: ${{ github.workspace }}/Matrice_Compatibilita_Esiti_Calcio_v1_0.xlsx

          PIPELINE_INCLUDE_CF: "true"
          PIPELINE_SAVE_PRIVATE_CF_OUTPUT: "true"
          PIPELINE_DES_STATO: "VENDUTO"
          PIPELINE_GIORNI_BACK: "270"
        run: |
          python master_pepiline_concessionari.py

      - name: Controlla output richiesti
        run: |
          set -e

          files=(
            ".runtime_output/12_concessionari_montecarlo_statistiche.csv"
            ".runtime_output/13_concessionari_montecarlo_per_concessionario.csv"
            ".runtime_output/13_concessionari_montecarlo_per_nome_commerciale.csv"
            ".runtime_output/13_concessionari_montecarlo_nomecommerciale_cliente_id.csv"
            ".runtime_output/20_concessionari_cluster_commerciali.csv"
            ".runtime_output/21_concessionari_cluster_summary.csv"
            ".runtime_output/16_top20_eventi_impatto_per_concessionario.csv"
            ".runtime_output/17_top20_eventi_impatto_per_nome_commerciale.csv"
            ".runtime_output/output_privato/mappa_cliente_id_codice_fiscale.csv"
          )

          for f in "${files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "File mancante: $f"
              exit 1
            fi
          done

          echo "Tutti gli output richiesti sono presenti."

      - name: Copia output privato CF nella repository privata
        run: |
          mkdir -p output_privato
          cp .runtime_output/output_privato/mappa_cliente_id_codice_fiscale.csv output_privato/

      - name: Commit output privato nella repository privata
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

          git add -f output_privato/mappa_cliente_id_codice_fiscale.csv

          git diff --cached --quiet && {
            echo "Nessuna modifica privata da committare."
            exit 0
          }

          git commit -m "Aggiornamento automatico mappa privata clienti"
          git push

      - name: Copia soltanto output pubblici autorizzati
        run: |
          rm -rf output_pubblici
          mkdir -p output_pubblici

          cp .runtime_output/12_concessionari_montecarlo_statistiche.csv output_pubblici/
          cp .runtime_output/13_concessionari_montecarlo_per_concessionario.csv output_pubblici/
          cp .runtime_output/13_concessionari_montecarlo_per_nome_commerciale.csv output_pubblici/
          cp .runtime_output/13_concessionari_montecarlo_nomecommerciale_cliente_id.csv output_pubblici/
          cp .runtime_output/20_concessionari_cluster_commerciali.csv output_pubblici/
          cp .runtime_output/21_concessionari_cluster_summary.csv output_pubblici/
          cp .runtime_output/16_top20_eventi_impatto_per_concessionario.csv output_pubblici/
          cp .runtime_output/17_top20_eventi_impatto_per_nome_commerciale.csv output_pubblici/

      - name: Conferma assenza dati sensibili negli output pubblici
        run: |
          python - <<'PY'
          import pandas as pd
          from pathlib import Path

          cartella = Path("output_pubblici")

          colonne_vietate = {
              "codice_fiscale",
              "cf",
              "id_ticket",
              "ticket_key",
          }

          file_cliente = cartella / "13_concessionari_montecarlo_nomecommerciale_cliente_id.csv"

          if not file_cliente.exists():
              raise SystemExit(f"Pubblicazione bloccata: manca {file_cliente}")

          for file in cartella.glob("*.csv"):
              df = pd.read_csv(file, sep=";", dtype=str)
              colonne = {str(c).strip().lower() for c in df.columns}
              presenti = colonne_vietate.intersection(colonne)

              if presenti:
                  raise SystemExit(
                      f"Pubblicazione bloccata: colonne vietate presenti in {file.name}: {sorted(presenti)}"
                  )

          df_cliente = pd.read_csv(file_cliente, sep=";", dtype=str)
          colonne_cliente = {str(c).strip().lower() for c in df_cliente.columns}

          if "cliente_id" not in colonne_cliente:
              raise SystemExit("Pubblicazione bloccata: cliente_id assente nel file cliente pubblico.")

          print("Verifica output pubblici superata: nessuna colonna sensibile trovata.")
          PY

      - name: Checkout repository pubblica output
        uses: actions/checkout@v4
        with:
          repository: albagammamarketing-source/output-63_montecarlo_pubblici
          token: ${{ secrets.OUTPUT_REPO_TOKEN }}
          path: repo_output_pubblico

      - name: Pubblica CSV nella repository pubblica
        run: |
          mkdir -p repo_output_pubblico/output
          cp output_pubblici/*.csv repo_output_pubblico/output/

          cd repo_output_pubblico

          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

          git add -f output/*.csv

          git diff --cached --quiet && {
            echo "Nessuna modifica pubblica da pubblicare."
            exit 0
          }

          git commit -m "Aggiornamento automatico output Monte Carlo pubblici"
          git push
