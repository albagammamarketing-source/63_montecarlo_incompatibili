name: Aggiorna output Monte Carlo

on:
  workflow_dispatch:
  schedule:
    - cron: "20 */3 * * *"

permissions:
  contents: write

jobs:
  genera-output:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Controlla matrice esiti
        run: |
          test -f Matrice_Compatibilita_Esiti_Calcio_v1_0.xlsx || {
            echo "Manca Matrice_Compatibilita_Esiti_Calcio_v1_0.xlsx nella root."
            exit 1
          }

      - name: Prepara cartella runtime
        run: |
          rm -rf .runtime_output
          mkdir -p .runtime_output

      - name: Esegui pipeline Monte Carlo completa con CF
        env:
          PIPELINE_DB_CONFIG_JSON: ${{ secrets.PIPELINE_DB_CONFIG_JSON }}
          PIPELINE_DB_HOST: ${{ secrets.PIPELINE_DB_HOST }}
          PIPELINE_DB_USER: ${{ secrets.PIPELINE_DB_USER }}
          PIPELINE_DB_PASSWORD: ${{ secrets.PIPELINE_DB_PASSWORD }}
          PIPELINE_DB_PORT: ${{ secrets.PIPELINE_DB_PORT }}
          PIPELINE_PROJECT_PATH: ${{ github.workspace }}
          PIPELINE_BASE_PATH: ${{ github.workspace }}/.runtime_output
          PIPELINE_MATRIX_FILE: ${{ github.workspace }}/Matrice_Compatibilita_Esiti_Calcio_v1_0.xlsx
          PIPELINE_INCLUDE_CF: "true"
          PIPELINE_DES_STATO: "VENDUTO"
          PIPELINE_GIORNI_BACK: "270"
          PIPELINE_N_SIM: "5000"
        run: |
          python master_pepiline_concessionari.py

      - name: Controlla output richiesti
        run: |
          set -e

          files=(
            ".runtime_output/9_concessionari_ticket_probabilistico.csv"
            ".runtime_output/10_concessionari_riepilogo_probabilistico_per_nome_commerciale.csv"
            ".runtime_output/11_concessionari_montecarlo_simulazioni.csv"
            ".runtime_output/12_concessionari_montecarlo_statistiche.csv"
            ".runtime_output/13_concessionari_montecarlo_per_concessionario.csv"
            ".runtime_output/13_concessionari_montecarlo_per_nome_commerciale.csv"
            ".runtime_output/13_concessionari_montecarlo_nomecommerciale_cf.csv"
            ".runtime_output/14_concessionari_top_ticket_rischio.csv"
            ".runtime_output/15_concessionari_eventi_probabilita_drift.csv"
            ".runtime_output/15b_concessionari_montecarlo_ticket_info_compatibilita.csv"
            ".runtime_output/16_concessionari_ticket_incompatibili.csv"
            ".runtime_output/17_concessionari_coppie_esiti_non_mappate.csv"
            ".runtime_output/18_concessionari_riepilogo_compatibilita.csv"
            ".runtime_output/19_concessionari_diagnostica_mapping_esiti.csv"
            ".runtime_output/20_concessionari_cluster_commerciali.csv"
            ".runtime_output/21_concessionari_cluster_summary.csv"
            ".runtime_output/16_top20_eventi_impatto_per_concessionario.csv"
            ".runtime_output/17_top20_eventi_impatto_per_nome_commerciale.csv"
            ".runtime_output/18_eventi_impatto_completo.csv"
          )

          for f in "${files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "File mancante: $f"
              exit 1
            fi
          done

          echo "Tutti gli output finali richiesti sono presenti."

      - name: Copia output finali nella cartella output
        run: |
          rm -rf output
          mkdir -p output

          cp .runtime_output/9_concessionari_ticket_probabilistico.csv output/
          cp .runtime_output/10_concessionari_riepilogo_probabilistico_per_nome_commerciale.csv output/
          cp .runtime_output/11_concessionari_montecarlo_simulazioni.csv output/
          cp .runtime_output/12_concessionari_montecarlo_statistiche.csv output/
          cp .runtime_output/13_concessionari_montecarlo_per_concessionario.csv output/
          cp .runtime_output/13_concessionari_montecarlo_per_nome_commerciale.csv output/
          cp .runtime_output/13_concessionari_montecarlo_nomecommerciale_cf.csv output/
          cp .runtime_output/14_concessionari_top_ticket_rischio.csv output/
          cp .runtime_output/15_concessionari_eventi_probabilita_drift.csv output/
          cp .runtime_output/15b_concessionari_montecarlo_ticket_info_compatibilita.csv output/
          cp .runtime_output/16_concessionari_ticket_incompatibili.csv output/
          cp .runtime_output/17_concessionari_coppie_esiti_non_mappate.csv output/
          cp .runtime_output/18_concessionari_riepilogo_compatibilita.csv output/
          cp .runtime_output/19_concessionari_diagnostica_mapping_esiti.csv output/
          cp .runtime_output/20_concessionari_cluster_commerciali.csv output/
          cp .runtime_output/21_concessionari_cluster_summary.csv output/
          cp .runtime_output/16_top20_eventi_impatto_per_concessionario.csv output/
          cp .runtime_output/17_top20_eventi_impatto_per_nome_commerciale.csv output/
          cp .runtime_output/18_eventi_impatto_completo.csv output/

      - name: Verifica file 13 CF aggiornato
        run: |
          python - <<'PY'
          import pandas as pd
          from pathlib import Path

          file_cf = Path("output/13_concessionari_montecarlo_nomecommerciale_cf.csv")

          if not file_cf.exists():
              raise SystemExit(f"File mancante: {file_cf}")

          df = pd.read_csv(file_cf, sep=";", dtype=str, nrows=5)
          colonne = [str(c).strip() for c in df.columns]
          colonne_lower = {c.lower() for c in colonne}

          print("Colonne trovate nel file 13 CF:")
          print(colonne)

          if "codice_fiscale" not in colonne_lower and "cf" not in colonne_lower:
              raise SystemExit("Errore: nel file CF manca la colonna codice_fiscale/cf.")

          if "eventi_medi_giocati_cf" not in colonne_lower:
              raise SystemExit("Errore: nel file CF manca la colonna eventi_medi_giocati_cf.")

          print("Verifica superata: codice_fiscale ed eventi_medi_giocati_cf presenti.")
          PY

      - name: Mostra dimensione output
        run: |
          echo "Dimensione file output:"
          ls -lh output/

      - name: Commit output finali nella repository
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

          git add -f output/*.csv

          git diff --cached --quiet && {
            echo "Nessuna modifica output da committare."
            exit 0
          }

          git commit -m "Aggiornamento automatico output Monte Carlo finali"
          git push
